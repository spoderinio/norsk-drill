<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin – Kategorier</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3e;--accent:#4f8ef7;--red:#e74c3c;--text:#e0e0e0;--muted:#666;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;padding:16px;}
h1{margin-bottom:4px;} .sub{color:var(--muted);font-size:.9em;margin-bottom:24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
label{display:block;font-size:.85em;color:var(--muted);margin-bottom:4px;}
input{width:100%;padding:8px 12px;background:#0f1117;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.95em;margin-bottom:12px;}
.row{display:flex;gap:12px;} .row input{margin-bottom:0;}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:.9em;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-sm{padding:5px 12px;font-size:.8em;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:.9em;}
th{color:var(--muted);font-weight:600;}
.icon{font-size:1.4em;}
a.btn{text-decoration:none;display:inline-block;}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.nav a{color:var(--muted);text-decoration:none;font-size:.9em;}
</style>
</head>
<body>
<div class="nav">
  <span>⚙️ Admin / Kategorier</span>
  <a href="/admin/">← Admin</a>
</div>
<h1>📂 Egne kategorier</h1>
<p class="sub">Opprett egne ord-kategorier utover substantiv, verb osv.</p>

<div class="card">
  <h3 style="margin-bottom:16px;">Ny kategori</h3>
  <form method="post" action="/admin/categories/add">
    <label>Navn</label>
    <input name="name" placeholder="f.eks. Farger, Tall, Mat..." required/>
    <div class="row">
      <div style="flex:0 0 80px;">
        <label>Ikon</label>
        <input name="icon" value="📝" maxlength="4"/>
      </div>
      <div style="flex:0 0 140px;">
        <label>Farge</label>
        <input name="color" type="color" value="#4f8ef7" style="height:38px;padding:2px 6px;"/>
      </div>
      <div style="flex:1;display:flex;align-items:flex-end;">
        <button class="btn btn-primary" type="submit" style="width:100%;">Opprett</button>
      </div>
    </div>
  </form>
</div>

{% if cats %}
<div class="card">
  <table>
    <thead><tr><th>Ikon</th><th>Navn</th><th>Ord</th><th></th></tr></thead>
    <tbody>
    {% for cat in cats %}
    <tr>
      <td class="icon">{{ cat.icon }}</td>
      <td><strong>{{ cat.name }}</strong></td>
      <td>—</td>
      <td style="text-align:right;display:flex;gap:8px;justify-content:flex-end;">
        <a class="btn btn-primary btn-sm" href="/admin/categories/{{ cat.id }}/entries">Rediger ord</a>
        <form method="post" action="/admin/categories/delete/{{ cat.id }}" style="display:inline;">
          <button class="btn btn-danger btn-sm" onclick="return confirm('Slett kategori og alle ord?')">Slett</button>
        </form>
      </td>
    </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<p style="color:var(--muted);text-align:center;margin-top:40px;">Ingen kategorier ennå.</p>
{% endif %}
</body>
</html>
