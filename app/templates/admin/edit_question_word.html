<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rediger spørreord</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3e;--accent:#9b59b6;--accent2:#b07edb;--text:#e0e0e0;--muted:#666;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;}
.nav{background:#1a1427;border-bottom:1px solid #3a2d5e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-title{font-weight:700;color:var(--accent2);}
.nav-links a{color:var(--muted);text-decoration:none;margin-left:14px;font-size:.9em;}
.container{max-width:600px;margin:0 auto;padding:30px 20px;}
h2{margin-bottom:24px;}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;}
.field{margin-bottom:16px;}
label{display:block;font-size:.8em;color:var(--muted);margin-bottom:6px;}
input,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:1em;}
input:focus,textarea:focus{outline:none;border-color:var(--accent);}
textarea{min-height:80px;resize:vertical;}
.btn-row{display:flex;gap:10px;margin-top:20px;}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.95em;font-weight:600;}
.btn-save{background:var(--accent);color:#fff;flex:1;}
.btn-save:hover{background:var(--accent2);}
.btn-cancel{background:var(--border);color:var(--muted);}
.btn-cancel:hover{color:var(--text);}
</style>
</head>
<body>
<nav class="nav">
  <span class="nav-title">✏️ Rediger spørreord</span>
  <div class="nav-links">
    <a href="/admin/question-words">← Tilbake</a>
  </div>
</nav>
<div class="container">
  <h2>Rediger: {{ qw.norwegian }}</h2>
  <div class="section">
    <form method="post" action="/admin/question-words/edit/{{ qw.id }}">
      <div class="field">
        <label>Norsk (spørreord)</label>
        <input name="norwegian" value="{{ qw.norwegian }}" required/>
      </div>
      <div class="field">
        <label>Oversettelse (BG) – kommaseparert</label>
        <input name="translations" value="{{ qw.translations | join(', ') }}" required/>
      </div>
      <div class="field">
        <label>Eksempel (norsk)</label>
        <input name="example_no" value="{{ qw.example_no or '' }}"/>
      </div>
      <div class="field">
        <label>Eksempel (BG)</label>
        <input name="example_bg" value="{{ qw.example_bg or '' }}"/>
      </div>
      <div class="field">
        <label>Notater</label>
        <textarea name="notes">{{ qw.notes or '' }}</textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-save" type="submit">💾 Lagre</button>
        <a href="/admin/question-words"><button class="btn btn-cancel" type="button">Avbryt</button></a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
