<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin – Norsk Drill</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3e;--accent:#4f8ef7;--green:#2ecc71;--text:#e0e0e0;--muted:#666;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;}
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-title{font-weight:700;color:var(--accent);}
.nav-links a{color:var(--muted);text-decoration:none;margin-left:14px;font-size:.9em;}
.nav-links a:hover{color:var(--text);}
.container{max-width:800px;margin:0 auto;padding:30px 20px;}
h1{margin-bottom:8px;} .subtitle{color:var(--muted);margin-bottom:30px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-decoration:none;color:var(--text);transition:all .2s;display:block;}
.card:hover{border-color:var(--accent);transform:translateY(-2px);}
.card.special{border-color:#9b59b6;background:#1a1427;}
.card.special:hover{border-color:#b07edb;}
.card-icon{font-size:1.8em;margin-bottom:8px;}
.card-title{font-size:1em;font-weight:600;margin-bottom:4px;}
.card-count{color:var(--muted);font-size:.85em;}
.back{margin-top:24px;text-align:center;} .back a{color:var(--muted);text-decoration:none;font-size:.85em;}
</style>
</head>
<body>
<nav class="nav">
  <span class="nav-title">⚙️ Admin Panel</span>
  <div class="nav-links"><a href="/">🏠 Hjem</a></div>
</nav>
<div class="container">
  <h1>Admin Panel</h1>
  <p class="subtitle">Administrer vokabular og spørreord.</p>
  <div class="grid">
    <a class="card" href="/admin/nouns">
      <div class="card-icon">📖</div>
      <div class="card-title">Substantiv</div>
      <div class="card-count">{{ noun_count }} ord</div>
    </a>
    <a class="card" href="/admin/verbs">
      <div class="card-icon">⚡</div>
      <div class="card-title">Verb</div>
      <div class="card-count">{{ verb_count }} verb</div>
    </a>
    <a class="card" href="/admin/adjectives">
      <div class="card-icon">🎨</div>
      <div class="card-title">Adjektiv</div>
      <div class="card-count">{{ adj_count }} adjektiv</div>
    </a>
    <a class="card" href="/admin/phrases">
      <div class="card-icon">🗣️</div>
      <div class="card-title">Fraser</div>
      <div class="card-count">{{ phrase_count }} fraser</div>
    </a>
    <a class="card special" href="/admin/question-words">
      <div class="card-icon">❓</div>
      <div class="card-title">Spørreord</div>
      <div class="card-count">{{ qw_count }} spørreord</div>
    </a>
  </div>
  <div class="back"><a href="/">← Tilbake til hjem</a></div>
</div>
</body>
</html>
