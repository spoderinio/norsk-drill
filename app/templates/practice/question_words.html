<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spørreord – Norsk Drill</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3e;--accent:#9b59b6;--accent2:#b07edb;--green:#2ecc71;--red:#e74c3c;--text:#e0e0e0;--muted:#666;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
.nav{background:#1a1427;border-bottom:1px solid #3a2d5e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-title{font-size:1.1em;font-weight:700;color:var(--accent2);}
.nav-links a{color:var(--muted);text-decoration:none;margin-left:16px;font-size:.9em;}
.nav-links a:hover{color:var(--text);}
.container{max-width:600px;margin:0 auto;padding:30px 20px;}

.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:24px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);transition:width .4s;width:0%;}
.progress-text{font-size:.8em;color:var(--muted);text-align:right;margin-top:4px;}

.card{background:#1a1427;border:1px solid #3a2d5e;border-radius:16px;padding:28px;text-align:center;}
.card-label{font-size:.75em;letter-spacing:.1em;text-transform:uppercase;color:var(--accent2);margin-bottom:16px;}
.question-word{font-size:3em;font-weight:700;color:var(--accent2);margin-bottom:6px;}
.tts-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2em;margin-bottom:20px;}
.tts-btn:hover{color:var(--text);}

.input-group{display:flex;gap:8px;margin-bottom:16px;}
.input-group input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:1em;}
.input-group input:focus{outline:none;border-color:var(--accent);}
.btn{padding:12px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.95em;font-weight:600;}
.btn-check{background:var(--accent);color:#fff;}
.btn-check:hover{background:var(--accent2);}
.btn-skip{background:var(--border);color:var(--muted);padding:10px 16px;}
.btn-skip:hover{color:var(--text);}
.btn-next{background:var(--accent);color:#fff;width:100%;margin-top:12px;}
.btn-next:hover{background:var(--accent2);}

.result-box{border-radius:10px;padding:16px;margin-bottom:12px;text-align:left;}
.result-correct{background:#1a3a1a;border:1px solid var(--green);color:var(--green);}
.result-wrong{background:#3a1a1a;border:1px solid var(--red);color:var(--red);}
.result-label{font-size:.8em;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.result-value{font-size:1.1em;font-weight:600;}
.result-translations{font-size:.85em;color:var(--muted);margin-top:6px;}

.example-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-top:12px;text-align:left;}
.example-label{font-size:.75em;color:var(--muted);margin-bottom:4px;}
.example-no{color:var(--accent2);font-style:italic;}
.example-bg{color:var(--muted);font-size:.9em;margin-top:2px;}
.notes-box{font-size:.85em;color:var(--muted);padding:8px 0;font-style:italic;}

.stats-row{display:flex;justify-content:center;gap:30px;margin-bottom:20px;}
.stat{text-align:center;}
.stat-val{font-size:1.4em;font-weight:700;}
.stat-val.green{color:var(--green);}
.stat-val.red{color:var(--red);}
.stat-label{font-size:.75em;color:var(--muted);}

.done-screen{text-align:center;padding:40px 20px;}
.done-screen h2{font-size:2em;margin-bottom:12px;color:var(--accent2);}
.done-screen p{color:var(--muted);margin-bottom:20px;}
.hidden{display:none;}
</style>
</head>
<body>
<nav class="nav">
  <span class="nav-title">❓ Spørreord</span>
  <div class="nav-links">
    <a href="/">🏠 Hjem</a>
    <a href="/admin/question-words">⚙️ Admin</a>
  </div>
</nav>

<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-text" id="progress-text">— ord igjen</div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val green" id="stat-correct">0</div><div class="stat-label">✅ Riktig</div></div>
    <div class="stat"><div class="stat-val red" id="stat-wrong">0</div><div class="stat-label">❌ Feil</div></div>
  </div>

  <!-- Practice card -->
  <div class="card" id="practice-card">
    <div class="card-label">❓ Spørreord – hva betyr det?</div>
    <div class="question-word" id="word-display">—</div>
    <button class="tts-btn" onclick="speak()" title="Lytt til uttale">🔊</button>
    <div class="input-group">
      <input type="text" id="answer-input" placeholder="Oversettelse (BG)..." autocomplete="off" autocorrect="off"/>
      <button class="btn btn-check" onclick="checkAnswer()">✓</button>
    </div>
    <button class="btn btn-skip" onclick="skipWord()">⏭ Hopp over</button>

    <!-- Result -->
    <div id="result-box" class="hidden">
      <div id="result-content"></div>
      <div id="example-area" class="hidden">
        <div class="example-box">
          <div class="example-label">Eksempel:</div>
          <div class="example-no" id="example-no"></div>
          <div class="example-bg" id="example-bg"></div>
        </div>
      </div>
      <div id="notes-area" class="hidden notes-box"></div>
      <button class="btn btn-next" onclick="loadNext()">Neste →</button>
    </div>
  </div>

  <!-- Done screen -->
  <div class="done-screen hidden" id="done-screen">
    <h2>🎉 Ferdig!</h2>
    <p id="done-stats"></p>
    <button class="btn btn-check" style="margin:8px auto;display:block;" onclick="resetSession()">🔄 Start på nytt</button>
    <a href="/" style="display:block;text-align:center;margin-top:12px;color:var(--muted);">← Tilbake til hjem</a>
  </div>
</div>

<script>
let seenIds = [], currentItem = null, correct = 0, wrong = 0, total = 0;

async function loadNext() {
  document.getElementById('result-box').classList.add('hidden');
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').disabled = false;
  document.getElementById('answer-input').style.borderColor = '';

  const resp = await fetch('/practice/question-words/next', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({seen_ids: seenIds})
  });
  const data = await resp.json();

  if (data.done) {
    showDone(); return;
  }

  currentItem = data;
  seenIds.push(data.id);
  total = Math.max(total, seenIds.length);

  document.getElementById('word-display').textContent = data.norwegian;
  document.getElementById('progress-text').textContent = `${seenIds.length} øvd`;
  document.getElementById('answer-input').focus();
}

async function checkAnswer() {
  if (!currentItem) return;
  const answer = document.getElementById('answer-input').value.trim();

  const resp = await fetch('/practice/question-words/check', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({id: currentItem.id, answer})
  });
  const data = await resp.json();
  showResult(data);
}

function showResult(data) {
  const isCorrect = data.correct;
  if (isCorrect) correct++; else wrong++;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;

  const box = document.getElementById('result-box');
  box.classList.remove('hidden');

  const translations = (data.translations || []).join(', ');
  const content = document.getElementById('result-content');
  if (isCorrect) {
    content.innerHTML = `<div class="result-box result-correct"><div class="result-label">✅ Riktig!</div><div class="result-translations">${translations}</div></div>`;
  } else {
    content.innerHTML = `<div class="result-box result-wrong"><div class="result-label">❌ Feil – riktig svar:</div><div class="result-value">${translations}</div></div>`;
  }

  // Example
  const exArea = document.getElementById('example-area');
  if (data.example_no || data.example_bg) {
    exArea.classList.remove('hidden');
    document.getElementById('example-no').textContent = data.example_no || '';
    document.getElementById('example-bg').textContent = data.example_bg || '';
  } else {
    exArea.classList.add('hidden');
  }

  // Notes
  const notesArea = document.getElementById('notes-area');
  if (data.notes) {
    notesArea.classList.remove('hidden');
    notesArea.textContent = '📌 ' + data.notes;
  } else {
    notesArea.classList.add('hidden');
  }

  document.getElementById('answer-input').disabled = true;
}

function skipWord() {
  if (!currentItem) return;
  wrong++;
  document.getElementById('stat-wrong').textContent = wrong;
  // Show answer then move on
  if (currentItem) {
    const translations = (currentItem.translations || []).join(', ');
    const box = document.getElementById('result-box');
    box.classList.remove('hidden');
    document.getElementById('result-content').innerHTML =
      `<div class="result-box result-wrong"><div class="result-label">⏭ Hoppet over</div><div class="result-value">${translations}</div></div>`;
    document.getElementById('example-area').classList.add('hidden');
    document.getElementById('notes-area').classList.add('hidden');
    document.getElementById('answer-input').disabled = true;
  }
}

function showDone() {
  document.getElementById('practice-card').classList.add('hidden');
  const done = document.getElementById('done-screen');
  done.classList.remove('hidden');
  const pct = total > 0 ? Math.round(correct / (correct + wrong) * 100) : 0;
  document.getElementById('done-stats').textContent =
    `${correct} riktige av ${correct + wrong} forsøk (${pct}%)`;
}

function resetSession() {
  seenIds = []; currentItem = null; correct = 0; wrong = 0; total = 0;
  document.getElementById('stat-correct').textContent = 0;
  document.getElementById('stat-wrong').textContent = 0;
  document.getElementById('done-screen').classList.add('hidden');
  document.getElementById('practice-card').classList.remove('hidden');
  loadNext();
}

function speak() {
  if (!currentItem || !window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(currentItem.norwegian);
  u.lang = 'nb-NO';
  window.speechSynthesis.speak(u);
}

document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!document.getElementById('result-box').classList.contains('hidden')) {
      loadNext();
    } else {
      checkAnswer();
    }
  }
});

loadNext();
</script>
</body>
</html>
