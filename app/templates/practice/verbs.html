<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Verb – Norsk Drill</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3e;--accent:#4f8ef7;--green:#2ecc71;--red:#e74c3c;--text:#e0e0e0;--muted:#666;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-title{font-weight:700;color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-links a{color:var(--muted);text-decoration:none;margin-left:14px;font-size:.9em;}
.mode-badge{font-size:.78em;padding:3px 10px;border-radius:10px;font-weight:600;}
.mode-badge.no{background:#1a2a4a;color:var(--accent);}
.mode-badge.bg{background:#2a1608;color:#e67e22;}
.container{max-width:620px;margin:0 auto;padding:20px 16px;}
.level-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;align-items:center;}
.level-bar span{font-size:.78em;color:var(--muted);margin-right:4px;}
.lvl-btn{padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.82em;transition:all .2s;}
.lvl-btn:hover{border-color:var(--accent);color:var(--accent);}
.lvl-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.stats-row{display:flex;justify-content:center;gap:28px;margin-bottom:14px;}
.stat{text-align:center;} .stat-val{font-size:1.3em;font-weight:700;}
.stat-val.green{color:var(--green);} .stat-val.red{color:var(--red);}
.stat-label{font-size:.72em;color:var(--muted);}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;text-align:center;}
.card-label{font-size:.72em;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.word-display{font-size:2.2em;font-weight:700;margin-bottom:4px;}
.word-no{color:var(--text);} .word-bg{color:#f0d080;}
.tts-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1em;margin-bottom:6px;}
.group-box{background:#2a1a3a;border:1px solid #5a3a8a;border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:.85em;color:#b07edb;text-align:left;}
.group-title{font-size:.72em;text-transform:uppercase;color:#7a5a9a;margin-bottom:2px;}
.level-pill{font-size:.72em;background:#1a2a4a;color:var(--accent);padding:2px 10px;border-radius:10px;display:inline-block;margin-bottom:12px;}
.trans-hint{font-size:.82em;color:var(--muted);margin-bottom:10px;}
.form-labels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px;}
.form-labels span{font-size:.72em;color:var(--muted);text-align:center;}
.inputs-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.inputs-row input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:.9em;text-align:center;width:100%;}
.inputs-row input:focus{outline:none;border-color:var(--accent);}
.inputs-row input.correct{border-color:var(--green);background:#1a3a1a;}
.inputs-row input.wrong{border-color:var(--red);background:#3a1a1a;}
.single-input-row{display:flex;gap:8px;margin-bottom:10px;}
.single-input-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:1em;}
.single-input-row input:focus{outline:none;border-color:var(--accent);}
.btn{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-size:.9em;font-weight:600;}
.btn-check{background:var(--accent);color:#fff;width:100%;margin-bottom:8px;}
.btn-skip{background:var(--border);color:var(--muted);width:100%;}
.btn-next{background:var(--accent);color:#fff;width:100%;margin-top:10px;}
.result-global{border-radius:9px;padding:12px 14px;margin-bottom:10px;text-align:left;}
.result-correct{background:#1a3a1a;border:1px solid var(--green);color:var(--green);}
.result-wrong{background:#3a1a1a;border:1px solid var(--red);color:var(--red);}
.result-label{font-size:.75em;text-transform:uppercase;letter-bottom:6px;}
.result-main{font-size:1.05em;font-weight:600;color:var(--text);margin-bottom:3px;}
.result-sub{font-size:.85em;color:#aaa;margin-top:3px;}
.result-yours{font-size:.82em;color:#777;margin-top:4px;}
.done-screen{text-align:center;padding:40px 20px;}
.done-screen h2{font-size:1.8em;margin-bottom:10px;}
.done-screen p{color:var(--muted);margin-bottom:20px;}
.hidden{display:none;}
</style>
</head>
<body>
<nav class="nav">
  <span class="nav-title">⚡ Verb</span>
  <div class="nav-right">
    <span class="mode-badge no" id="mode-badge">NO → BG</span>
    <div class="nav-links"><a href="/">🏠</a><a href="/admin/verbs">⚙️</a></div>
  </div>
</nav>
<div class="container">
  <div class="level-bar">
    <span>Nivå:</span>
    <button class="lvl-btn {% if selected_level=='all' %}active{% endif %}" data-level="all" onclick="changeLevel('all',this)">Alle</button>
    {% for lvl in levels %}
    <button class="lvl-btn {% if selected_level==lvl %}active{% endif %}" data-level="{{ lvl }}" onclick="changeLevel('{{ lvl }}',this)">{{ lvl }}</button>
    {% endfor %}
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-val green" id="stat-correct">0</div><div class="stat-label">✅ Riktig</div></div>
    <div class="stat"><div class="stat-val red" id="stat-wrong">0</div><div class="stat-label">❌ Feil</div></div>
  </div>
  <div class="card" id="practice-card">
    <div class="card-label" id="card-label">⚡ Bøy verbet</div>
    <div class="word-display word-no" id="word-display">—</div>
    <button class="tts-btn" id="tts-btn" onclick="speak()">🔊</button>
    <div class="level-pill hidden" id="level-pill"></div>
    <div id="group-box" class="group-box hidden"><div class="group-title">Gruppe</div><div id="group-text"></div></div>
    <div class="trans-hint hidden" id="trans-hint"></div>
    <div id="normal-inputs">
      <div class="form-labels"><span>Presens</span><span>Preteritum</span><span>Perfektum</span></div>
      <div class="inputs-row">
        <input type="text" id="inp-presens" placeholder="presens" autocomplete="off" autocorrect="off"/>
        <input type="text" id="inp-preteritum" placeholder="preteritum" autocomplete="off" autocorrect="off"/>
        <input type="text" id="inp-perfect" placeholder="har ..." autocomplete="off" autocorrect="off"/>
      </div>
    </div>
    <div id="reverse-input" class="hidden">
      <div class="single-input-row">
        <input type="text" id="inp-infinitiv" placeholder="å ..." autocomplete="off" autocorrect="off" spellcheck="false"/>
      </div>
    </div>
    <button class="btn btn-check" onclick="checkAnswer()">✓ Sjekk</button>
    <button class="btn btn-skip" onclick="skipWord()">⏭ Hopp over</button>
    <div id="result-area" class="hidden">
      <div id="result-content"></div>
      <button class="btn btn-next" onclick="loadNext()">Neste →</button>
    </div>
  </div>
  <div class="done-screen hidden" id="done-screen">
    <h2>🎉 Ferdig!</h2>
    <p id="done-stats"></p>
    <button class="btn btn-check" style="display:block;margin:0 auto;" onclick="resetSession()">🔄 Start på nytt</button>
    <a href="/" style="display:block;text-align:center;margin-top:12px;color:var(--muted);">← Tilbake</a>
  </div>
</div>
<script>
let seenIds=[], currentItem=null, correct=0, wrong=0;
let currentLevel='{{ selected_level }}';
const reverseMode = (localStorage.getItem('drill_mode')||'no')==='bg';

const badge=document.getElementById('mode-badge');
if(reverseMode){badge.textContent='BG → NO';badge.className='mode-badge bg';}

function changeLevel(level,btn){
  currentLevel=level;localStorage.setItem('drill_level',level);
  document.querySelectorAll('.lvl-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');resetSession();
}

async function loadNext(){
  document.getElementById('result-area').classList.add('hidden');
  ['inp-presens','inp-preteritum','inp-perfect'].forEach(id=>{const el=document.getElementById(id);el.value='';el.disabled=false;el.classList.remove('correct','wrong');});
  document.getElementById('inp-infinitiv').value='';
  document.getElementById('inp-infinitiv').disabled=false;
  const resp=await fetch('/practice/verbs/next',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({seen_ids:seenIds,level:currentLevel})});
  const data=await resp.json();
  if(data.done){showDone();return;}
  currentItem=data;seenIds.push(data.id);
  document.getElementById('level-pill').textContent='Nivå '+data.level;
  document.getElementById('level-pill').classList.remove('hidden');
  const wd=document.getElementById('word-display');
  const hint=document.getElementById('trans-hint');
  const gb=document.getElementById('group-box');
  if(reverseMode){
    wd.textContent=(data.translations||[]).join(' / ');
    wd.className='word-display word-bg';
    document.getElementById('card-label').textContent='⚡ Напиши инфинитива на норвежки:';
    document.getElementById('tts-btn').classList.add('hidden');
    hint.classList.add('hidden');
    gb.classList.add('hidden');
    document.getElementById('normal-inputs').classList.add('hidden');
    document.getElementById('reverse-input').classList.remove('hidden');
    document.getElementById('inp-infinitiv').focus();
  } else {
    wd.textContent=data.infinitive;
    wd.className='word-display word-no';
    document.getElementById('card-label').textContent='⚡ Bøy verbet';
    document.getElementById('tts-btn').classList.remove('hidden');
    hint.textContent=(data.translations||[]).join(', ');
    hint.classList.remove('hidden');
    if(data.group){gb.classList.remove('hidden');document.getElementById('group-text').textContent=(data.group_description?data.group+' – '+data.group_description:data.group);}
    else gb.classList.add('hidden');
    document.getElementById('normal-inputs').classList.remove('hidden');
    document.getElementById('reverse-input').classList.add('hidden');
    document.getElementById('inp-presens').focus();
  }
}

async function checkAnswer(){
  if(!currentItem)return;
  if(reverseMode){
    const ua=document.getElementById('inp-infinitiv').value.trim().toLowerCase().replace(/[.!?,;:]+$/,'');
    const ci=currentItem.infinitive.toLowerCase().replace(/^å\s*/,'');
    const uab=ua.replace(/^å\s*/,'');
    showResultReverse(uab===ci||ua===currentItem.infinitive.toLowerCase(),document.getElementById('inp-infinitiv').value.trim());
    document.getElementById('inp-infinitiv').disabled=true;
  } else {
    const resp=await fetch('/practice/verbs/check',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:currentItem.id,presens:document.getElementById('inp-presens').value,preteritum:document.getElementById('inp-preteritum').value,perfect:document.getElementById('inp-perfect').value})});
    const data=await resp.json();
    const allOk=data.presens&&data.preteritum&&data.perfect&&data.all_correct;
    if(allOk)correct++;else wrong++;
    document.getElementById('stat-correct').textContent=correct;
    document.getElementById('stat-wrong').textContent=wrong;
    ['presens','preteritum','perfect'].forEach(f=>{const el=document.getElementById('inp-'+f);el.classList.add(data[f]?'correct':'wrong');el.disabled=true;});
    const trans=(data.translations||[]).join(', ');
    const forms=`${data.presens||'—'} · ${data.preteritum||'—'} · har ${data.perfect||'—'}`;
    document.getElementById('result-content').innerHTML=allOk
      ?`<div class="result-global result-correct"><div class="result-label">✅ Riktig!</div><div class="result-main">${forms}</div><div class="result-sub">${trans}</div></div>`
      :`<div class="result-global result-wrong"><div class="result-label">❌ Riktig svar:</div><div class="result-main">${forms}</div><div class="result-sub">${trans}</div></div>`;
    document.getElementById('result-area').classList.remove('hidden');
  }
}

function showResultReverse(isCorrect,userAns){
  if(isCorrect)correct++;else wrong++;
  document.getElementById('stat-correct').textContent=correct;
  document.getElementById('stat-wrong').textContent=wrong;
  const trans=(currentItem.translations||[]).join(', ');
  document.getElementById('result-content').innerHTML=isCorrect
    ?`<div class="result-global result-correct"><div class="result-label">✅ Riktig!</div><div class="result-main">${currentItem.infinitive}</div><div class="result-sub">${trans}</div></div>`
    :`<div class="result-global result-wrong"><div class="result-label">❌ Riktig svar:</div><div class="result-main">${currentItem.infinitive}</div><div class="result-sub">${trans}</div><div class="result-yours">Du skrev: ${userAns||'—'}</div></div>`;
  document.getElementById('result-area').classList.remove('hidden');
}

function skipWord(){
  if(!currentItem)return;
  wrong++;document.getElementById('stat-wrong').textContent=wrong;
  const trans=(currentItem.translations||[]).join(', ');
  if(reverseMode){
    const userAns=document.getElementById('inp-infinitiv').value.trim();
    document.getElementById('inp-infinitiv').disabled=true;
    document.getElementById('result-content').innerHTML=
      `<div class="result-global result-wrong"><div class="result-label">⏭ Riktig svar:</div><div class="result-main">${currentItem.infinitive}</div><div class="result-sub">${trans}</div><div class="result-yours">Du skrev: ${userAns||'—'}</div></div>`;
  } else {
    ['inp-presens','inp-preteritum','inp-perfect'].forEach(id=>document.getElementById(id).disabled=true);
    const forms=`${currentItem.presens||'—'} · ${currentItem.preteritum||'—'} · har ${currentItem.perfect||'—'}`;
    document.getElementById('result-content').innerHTML=
      `<div class="result-global result-wrong"><div class="result-label">⏭ Riktig svar:</div><div class="result-main">${forms}</div><div class="result-sub">${trans}</div></div>`;
  }
  document.getElementById('result-area').classList.remove('hidden');
}

function showDone(){
  document.getElementById('practice-card').classList.add('hidden');
  document.getElementById('done-screen').classList.remove('hidden');
  const total=correct+wrong,pct=total>0?Math.round(correct/total*100):0;
  document.getElementById('done-stats').textContent=`${correct} riktige av ${total} forsøk (${pct}%)`;
}
function resetSession(){
  seenIds=[];currentItem=null;correct=0;wrong=0;
  document.getElementById('stat-correct').textContent=0;
  document.getElementById('stat-wrong').textContent=0;
  document.getElementById('done-screen').classList.add('hidden');
  document.getElementById('practice-card').classList.remove('hidden');
  loadNext();
}
function speak(){if(!currentItem||!window.speechSynthesis||reverseMode)return;const u=new SpeechSynthesisUtterance(currentItem.infinitive);u.lang='nb-NO';window.speechSynthesis.speak(u);}
document.getElementById('inp-perfect').addEventListener('keydown',e=>{if(e.key==='Enter'&&!reverseMode){if(!document.getElementById('result-area').classList.contains('hidden'))loadNext();else checkAnswer();}});
document.getElementById('inp-infinitiv').addEventListener('keydown',e=>{if(e.key==='Enter'){if(!document.getElementById('result-area').classList.contains('hidden'))loadNext();else checkAnswer();}});
const saved=localStorage.getItem('drill_level')||'all';
const savedBtn=document.querySelector(`.lvl-btn[data-level="${saved}"]`);
if(savedBtn){currentLevel=saved;document.querySelectorAll('.lvl-btn').forEach(b=>b.classList.remove('active'));savedBtn.classList.add('active');}
loadNext();
</script>
</body>
</html>
