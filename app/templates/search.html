<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Søk – Norsk Drill</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3e;--accent:#4f8ef7;--text:#e0e0e0;--muted:#666;--green:#2ecc71;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;}
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-title{font-weight:700;color:var(--accent);}
.nav-links a{color:var(--muted);text-decoration:none;margin-left:14px;font-size:.9em;}
.container{max-width:700px;margin:0 auto;padding:24px 16px;}
.search-bar{display:flex;gap:8px;margin-bottom:24px;}
.search-bar input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:1em;}
.search-bar input:focus{outline:none;border-color:var(--accent);}
.btn{padding:12px 20px;border-radius:10px;border:none;cursor:pointer;background:var(--accent);color:#fff;font-size:.95em;font-weight:600;}
.result-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.type-badge{padding:3px 10px;border-radius:10px;font-size:.75em;font-weight:700;min-width:70px;text-align:center;}
.type-noun{background:#1a2a4a;color:#7abcff;}
.type-verb{background:#1a3a2a;color:#5ecc71;}
.type-adjective{background:#2a1a3a;color:#b07edb;}
.type-phrase{background:#3a3a1a;color:#f0c040;}
.type-question_word{background:#2a1a2a;color:#e07edb;}
.result-main{flex:1;}
.result-norwegian{font-size:1.05em;font-weight:600;}
.result-trans{font-size:.85em;color:var(--muted);margin-top:2px;}
.level-badge{font-size:.72em;background:#2a2d3e;color:var(--muted);padding:2px 8px;border-radius:8px;white-space:nowrap;}
#results-info{color:var(--muted);font-size:.85em;margin-bottom:14px;}
</style>
</head>
<body>
<nav class="nav">
  <span class="nav-title">🔍 Søk</span>
  <div class="nav-links"><a href="/">🏠 Hjem</a></div>
</nav>
<div class="container">
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Søk på norsk eller bulgarsk..." value="{{ query }}" autocomplete="off"/>
    <button class="btn" onclick="doSearch()">🔍 Søk</button>
  </div>
  <div id="results-info"></div>
  <div id="results"></div>
</div>
<script>
const TYPE_LABELS = {noun:'Substantiv',verb:'Verb',adjective:'Adjektiv',phrase:'Frase',question_word:'Spørreord'};
const TYPE_CLASSES = {noun:'type-noun',verb:'type-verb',adjective:'type-adjective',phrase:'type-phrase',question_word:'type-question_word'};

async function doSearch(){
  const q = document.getElementById('search-input').value.trim();
  if(q.length < 2){ document.getElementById('results').innerHTML=''; document.getElementById('results-info').textContent=''; return; }
  const resp = await fetch('/search/results?q='+encodeURIComponent(q));
  const data = await resp.json();
  const results = data.results || [];
  document.getElementById('results-info').textContent = results.length ? `${results.length} resultat(er) for "${q}"` : `Ingen resultater for "${q}"`;
  document.getElementById('results').innerHTML = results.map(r => `
    <div class="result-item">
      <span class="type-badge ${TYPE_CLASSES[r.type]||''}">${TYPE_LABELS[r.type]||r.type}</span>
      <div class="result-main">
        <div class="result-norwegian">${r.norwegian}</div>
        <div class="result-trans">${(r.translations||[]).join(', ')}</div>
      </div>
      ${r.level && r.level !== '—' ? `<span class="level-badge">${r.level}</span>` : ''}
    <button onclick="speakWord('${r.norwegian.replace(/'/g, "\\'")}')" style="background:none;border:none;cursor:pointer;font-size:1.2em;padding:4px 8px;">🔊</button>
  </div>`).join('');
}

document.getElementById('search-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
if('{{ query }}') doSearch();
function isApple(){return /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent)&&typeof window.AudioContext!=='undefined';}
function speakWord(text){
  if(isApple()&&window.speechSynthesis){
    const u=new SpeechSynthesisUtterance(text);
    u.lang='nb-NO';window.speechSynthesis.speak(u);
  }else{
    const audio=new Audio('/tts?text='+encodeURIComponent(text));
    audio.play();
  }
}
</script>
</body>
</html>
